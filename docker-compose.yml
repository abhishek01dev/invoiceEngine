version: '3.8'

services:
  invoice-parser:
    build: .
    container_name: invoice-parser-ocr
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=Invoice OCR Parser Service
      - APP_VERSION=1.0.0
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - MAX_FILE_SIZE_MB=10
      - ALLOWED_EXTENSIONS=pdf,jpg,jpeg,png
      - TESSERACT_CMD=/usr/bin/tesseract
      - OCR_LANG=eng
      - OCR_DPI=300
      - MAX_WORKERS=2
      - PROCESSING_TIMEOUT=30
    volumes:
      - ./uploads:/tmp/invoice_uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s